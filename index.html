<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="../frontend/src/assets/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSP — Orientation Scolaire et Professionnelle</title>
    <meta name="description" content="Plateforme d'orientation scolaire et professionnelle à Madagascar" />

    <!-- ═══ EN-TÊTES DE SÉCURITÉ ══════════════════════════════════════════════ -->
    <!-- Content-Security-Policy : restreindre les sources de scripts/styles -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: blob: https:;
        connect-src 'self' http://localhost http://localhost:5173 http://localhost:8080 https://bambaray.mg https://dssip.bambaray.mg;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
      "
    />
    <!-- Empêche le MIME-sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Empêche le chargement dans une iframe (clickjacking) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <!-- Contrôle du referrer -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
