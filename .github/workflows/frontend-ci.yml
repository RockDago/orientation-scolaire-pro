name: Frontend CI/CD

on:
  push:
    branches:
      - main

env:
  # Corrige l'avertissement de dépréciation Node.js dans GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Empêche l'arrêt du workflow si le code contient de simples avertissements
  CI: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Deploy to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /
          # 1. Force la suppression des anciens fichiers avant déploiement (évite les conflits)
          dangerous-clean-slate: true
          # 2. Crée automatiquement les dossiers manquants
          create-directories: true
          # 3. Exclut les fichiers système ET votre dossier backend
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.log
            **/backend/**
            **/backend*/**
            **/*.php
          # 4. Mode de synchronisation complet pour une mise à jour propre
          dry-run: false